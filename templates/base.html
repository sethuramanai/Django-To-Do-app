{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TaskFlow{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="nav-shell" aria-label="Main navigation">
            <a class="brand" href="{% url 'tasks:list' %}">
                <span class="brand-mark">T</span>
                <span>TaskFlow</span>
            </a>
            <div class="nav-actions">
                {% if user.is_authenticated %}
                    <span class="user-chip">{{ user.username }}</span>
                    <a class="nav-action" href="{% url 'tasks:create' %}">New Task</a>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="nav-action logout-action" type="submit">Logout</button>
                    </form>
                {% else %}
                    <a class="nav-action" href="{% url 'tasks:signup' %}">Signup</a>
                {% endif %}
            </div>
        </nav>
    </header>

    {% if messages %}
        <div class="messages" aria-live="polite">
            {% for message in messages %}
                <p class="message {{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
