[pytest]
# Pytest configuration for UI automation tests with Playwright

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for different test types
markers =
    e2e: End-to-end tests
    auth: Authentication and login tests
    tasks: Task CRUD tests
    isolation: Multi-user isolation tests
    slow: Slow running tests

# Logging
log_cli = true
log_cli_level = INFO
log_level = INFO
